name: Bug report
description: Something looks wrong or behaves unexpectedly
title: "Bug: <short description>"
labels:
  - bug
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      placeholder: "When I click …, the page …"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: "I expected …"
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL
      placeholder: "https://excusecaddie.xyz"
  - type: input
    id: browser
    attributes:
      label: Browser + OS
      placeholder: "Chrome 123 / Windows 11"
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open …
        2. Click …
        3. See …
    validations:
      required: true

