name: Feature request
description: Suggest an improvement
title: "Feature: <short pitch>"
labels:
  - enhancement
body:
  - type: textarea
    id: pitch
    attributes:
      label: Pitch
      placeholder: "It would be great if …"
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why?
      placeholder: "This helps because …"
  - type: textarea
    id: ideas
    attributes:
      label: Implementation ideas (optional)
      placeholder: "Maybe in `app/page.js` …"

